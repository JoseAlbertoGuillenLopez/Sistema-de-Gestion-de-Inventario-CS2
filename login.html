<!DOCTYPE html> 
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Login - Inventario CS2</title>
		<link rel="stylesheet" href="CSS/login.css">
	</head>
	<body>

		
		<div id="loginForm" class="forma">
			<h2>Inventario CS2</h2>
			<h3>Login</h3>
			<input id="loginEmail" placeholder="email" type="email">
			<input id="loginPassword" type="password" placeholder="password">
			<button onclick="login()">Login</button>
			
			<div class="toggle">
				¿No tienes cuenta? <a onclick="toggleForms()">Crear una</a>
			</div>
		</div>

		
		<div id="registerForm" class="forma hidden">
			<h2>Inventario CS2</h2>
			<h3>Crear Cuenta</h3>
			<input id="registerName" placeholder="nombre" type="text">
			<input id="registerEmail" placeholder="email" type="email">
			<input id="registerPassword" type="password" placeholder="password">
			<button onclick="register()">Crear Cuenta</button>
			
			<div class="toggle">
				¿Ya tienes cuenta? <a onclick="toggleForms()">Login</a>
			</div>
		</div>

		<script>
			function checkSessionLogin() {
				fetch("http://127.0.0.1:3000/perfil", { credentials: "include" })
				//.then() es un método de las promesas (Promises) en JavaScript. Sirve para decir: “cuando termine esta operación asíncrona, haz esto”.
					.then(res => {
						if (res.ok) window.location = "index.html";
					});
			}

			function toggleForms() {
				document.getElementById("loginForm").classList.toggle("hidden");
				document.getElementById("registerForm").classList.toggle("hidden");
				
				// Limpiar campos
				document.getElementById("loginEmail").value = "";
				document.getElementById("loginPassword").value = "";
				document.getElementById("registerName").value = "";
				document.getElementById("registerEmail").value = "";
				document.getElementById("registerPassword").value = "";
			}

			function login(){
				const email = document.getElementById("loginEmail").value;
				const password = document.getElementById("loginPassword").value;

				if (!email || !password) {
					alert("Por favor completa email y password");
					return;
				}

				fetch("http://127.0.0.1:3000/login",{					
					method:"POST",
					headers:{
						"Content-Type":"application/json"
					},
					credentials:"include",
					body:JSON.stringify({
						email: email,
						password: password
					})
				})
				.then(res=>{
					if(res.ok){
						window.location="index.html";
					}else{
						alert("Email o password incorrecto");
					}
				})
				.catch(error => alert("Error: " + error.message));
			}

			function register() {
				const name = document.getElementById("registerName").value;
				const email = document.getElementById("registerEmail").value;
				const password = document.getElementById("registerPassword").value;

				if (!name || !email || !password) {
					alert("Por favor completa todos los campos");
					return;
				}

				fetch("http://127.0.0.1:3000/register",{					
					method:"POST",
					headers:{
						"Content-Type":"application/json"
					},
					body:JSON.stringify({
						name: name,
						email: email,
						password: password
					})
				})
				.then(res=>{
					if(res.ok){
						alert("Cuenta creada correctamente. Ahora inicia sesión");
						toggleForms();
						document.getElementById("loginEmail").focus();
					}else{
						alert("Error al crear la cuenta. El email ya existe");
					}
				})
				.catch(error => alert("Error: " + error.message));
			}

			checkSessionLogin();
		</script>

	</body>
</html>
